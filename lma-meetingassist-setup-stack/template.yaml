AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31

Description: Amazon Transcribe Live Meeting Assist - Meeting Assist Setup

Parameters:
  # Required
  LMAStackName:
    Type: String
    Description: LMA Stack Name

  # Required
  AISTACK:
    Type: String
    Description: AISTACK Stack ARN

  COGNITOSTACK:
    Type: String
    Description: COGNITOSTACK Stack ARN

  MeetingAssistService:
    Type: String
    Description: Choose which knowledge base / LLM service to use

  BedrockKnowledgeBaseId:
    Type: String
    Default: ""
    AllowedPattern: "^(|[0-9a-zA-Z]{10})$"

  BedrockKnowledgeBaseS3BucketName:
    Type: String

  MeetingAssistServiceBedrockModelID:
    Type: String
    Default: "anthropic.claude-3-sonnet-20240229-v1:0"

  TavilyApiKey:
    Type: String
    NoEcho: true
    Default: ""
    Description: >-
      (Optional - STRANDS_BEDROCK only) API key for Tavily web search service to enable web search tool.
      Get your API key from https://tavily.com. When provided, the Strands agent can search the web 
      for current information during meetings. Leave blank to disable web search capability.
    AllowedPattern: "^(|[a-zA-Z0-9_-]{20,})$"
    ConstraintDescription: "Must be empty or a valid Tavily API key (20+ characters)"

  TranscriptBedrockKnowledgeBaseId:
    Type: String
    Default: ""
    AllowedPattern: "^(|[0-9a-zA-Z]{10})$"

  WebAppBucket:
    Type: String
    Description: The LMA Web App Bucket Name.

  CloudFrontDistributionId:
    Type: String
    Description: The LMA web app CloudFront distribution id

  CloudFrontDomainName:
    Type: String
    Description: The domain name of the LMA CloudFront distribution

  AppSyncGraphQLUrl:
    Type: String
    Description: The AppSync GraphQL API URL

  EventApiHttpUrl:
    Type: String
    Default: ""
    Description: The AppSync Event API HTTP URL for MCP browser control

  MCPServersTableName:
    Type: String
    Default: ""
    Description: The DynamoDB table name for MCP server configurations

  FetchTranscriptFunctionArn:
    Type: String
    Description: ARN of Fetch Transcript function

  TranscriptSummaryFunctionArn:
    Type: String
    Description: ARN of Transcript Summary function (if defined)

  # Changes to Params below force MeetingAssist Setup to update.
  TranscribeLanguageCode:
    Type: String
  TranscriptLambdaHookFunctionArn:
    Type: String
  TranscriptLambdaHookFunctionNonPartialOnly:
    Type: String
  MeetingRecordExpirationInDays:
    Type: String
  TranscriptionExpirationInDays:
    Type: String
  EndOfCallTranscriptSummary:
    Type: String
  EndOfCallLambdaHookFunctionArn:
    Type: String
  Version:
    Type: String

  CloudWatchLogsExpirationInDays:
    Type: Number
    Default: 14
    Description: The number of days log events are kept in CloudWatch Logs.

  CustomerManagedEncryptionKeyArn:
    Type: String
    Description: ARN of the customer managed KMS key for encryption

  BedrockGuardrailId:
    Type: String
    Default: ""
    Description: Bedrock Guardrail ID for the Strands agent

  BedrockGuardrailVersion:
    Type: String
    Default: "DRAFT"
    Description: Bedrock Guardrail Version for the Strands agent

  PermissionsBoundaryArn:
    Type: String
    Default: ""
    Description: >-
      (Optional) ARN of an existing IAM managed policy to use as permissions boundary for IAM roles.
      If provided, this policy will limit the maximum permissions that can be granted to IAM roles
      in this stack, providing an additional layer of security.

Conditions:
  ShouldUseStrandsBedrock: !Equals [!Ref MeetingAssistService, "STRANDS_BEDROCK"]
  ShouldUseStrandsBedrockWithKBCreate: !Equals [!Ref MeetingAssistService, "STRANDS_BEDROCK_WITH_KB (Create)"]
  ShouldUseStrandsBedrockWithKBExisting: !Equals [!Ref MeetingAssistService, "STRANDS_BEDROCK_WITH_KB (Use Existing)"]
  ShouldUseStrandsBedrockWithKB: !Or [
    !Condition ShouldUseStrandsBedrockWithKBCreate,
    !Condition ShouldUseStrandsBedrockWithKBExisting
  ]
  ShouldDeployStrandsFunction: !Or [
    !Condition ShouldUseStrandsBedrock,
    !Condition ShouldUseStrandsBedrockWithKB
  ]
  HasSummaryLambdaFunction:
    !Not [!Equals [!Ref TranscriptSummaryFunctionArn, ""]]
  IsBedrockKnowledgeBaseS3BucketName:
    Fn::Not:
      - Fn::Equals:
          - ""
          - Ref: BedrockKnowledgeBaseS3BucketName
  ShouldConfigureTranscriptBedrockKB:
    !Not [!Equals [!Ref TranscriptBedrockKnowledgeBaseId, ""]]
  HasPermissionsBoundary: !Not [!Equals [!Ref PermissionsBoundaryArn, ""]]

Resources:
  Boto3Layer:
    Type: "AWS::Lambda::LayerVersion"
    Properties:
      Content: ./boto3_layer
      CompatibleRuntimes:
        - python3.12

  # Strands Lambda Layer for Strands SDK
  StrandsLayer:
    Type: "AWS::Lambda::LayerVersion"
    Condition: ShouldDeployStrandsFunction
    Properties:
      LayerName: !Sub "${LMAStackName}-strands-layer"
      Description: "Strands Agents SDK for meeting assistance"
      Content: ./strands_layer
      CompatibleRuntimes:
        - python3.12

  StrandsMeetingAssistFunctionRole:
    Condition: ShouldDeployStrandsFunction
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      PermissionsBoundary: !If
        - HasPermissionsBoundary
        - !Ref PermissionsBoundaryArn
        - !Ref AWS::NoValue
      Policies:
        - PolicyDocument:
            Version: 2012-10-17
            Statement:
              - Effect: Allow
                Action:
                  - "bedrock:InvokeModel"
                  - "bedrock:InvokeModelWithResponseStream"
                Resource: 
                  - !Sub "arn:aws:bedrock:*::foundation-model/*"
                  - !Sub "arn:aws:bedrock:${AWS::Region}:${AWS::AccountId}:inference-profile/*"
              - Effect: Allow
                Action:
                  - "bedrock:GetInferenceProfile"
                Resource:
                  - !Sub "arn:aws:bedrock:${AWS::Region}:${AWS::AccountId}:inference-profile/*"
              - Effect: Allow
                Action:
                  - "bedrock:ApplyGuardrail"
                Resource: "*"
          PolicyName: BedrockPolicy
        - PolicyDocument:
            Version: 2012-10-17
            Statement:
              - Effect: Allow
                Action:
                  - "bedrock:Retrieve"
                  - "bedrock:RetrieveAndGenerate"
                Resource: !Sub "arn:aws:bedrock:${AWS::Region}:${AWS::AccountId}:knowledge-base/*"
          PolicyName: BedrockKBPolicy
        - PolicyDocument:
            Version: 2012-10-17
            Statement:
              - Effect: Allow
                Action:
                  - "dynamodb:Query"
                  - "dynamodb:GetItem"
                Resource:
                  - !Sub "arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/*"
              - Effect: Allow
                Action:
                  - "dynamodb:Query"
                Resource:
                  - !Sub "arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${MCPServersTableName}"
              - Effect: Allow
                Action:
                  - "dynamodb:UpdateItem"
                Resource:
                  - !Sub "arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${MCPServersTableName}"
          PolicyName: DynamoDBPolicy
        - PolicyDocument:
            Version: 2012-10-17
            Statement:
              - Effect: Allow
                Action:
                  - "kms:Decrypt"
                  - "kms:Encrypt"
                  - "kms:DescribeKey"
                Resource:
                  - !Ref CustomerManagedEncryptionKeyArn
                Condition:
                  StringEquals:
                    "kms:ViaService": !Sub "dynamodb.${AWS::Region}.amazonaws.com"
          PolicyName: KMSPolicy
        - PolicyDocument:
            Version: 2012-10-17
            Statement:
              - Effect: Allow
                Action:
                  - "kms:Decrypt"
                  - "kms:Encrypt"
                  - "kms:GenerateDataKey"
                Resource:
                  - !Ref CustomerManagedEncryptionKeyArn
          PolicyName: KMSDecryptPolicy
        - PolicyDocument:
            Version: 2012-10-17
            Statement:
              - Effect: Allow
                Action:
                  - "appsync:GraphQL"
                Resource:
                  - !Sub "arn:aws:appsync:${AWS::Region}:${AWS::AccountId}:apis/*/types/Mutation/fields/addChatToken"
                  - !Sub "arn:aws:appsync:${AWS::Region}:${AWS::AccountId}:apis/*/types/Mutation/fields/toggleVNCPreview"
                  - !Sub "arn:aws:appsync:${AWS::Region}:${AWS::AccountId}:apis/*/types/Mutation/fields/executeMCPCommand"
                  - !Sub "arn:aws:appsync:${AWS::Region}:${AWS::AccountId}:apis/*/types/Mutation/fields/publishMCPResult"
                  - !Sub "arn:aws:appsync:${AWS::Region}:${AWS::AccountId}:apis/*/types/Query/fields/getMCPCommand"
              - Effect: Allow
                Action:
                  - "appsync:EventPublish"
                Resource:
                  - !Sub "arn:aws:appsync:${AWS::Region}:${AWS::AccountId}:apis/*/channelNamespace/mcp-commands"
          PolicyName: AppSyncGraphQLPolicy
        - PolicyName: InlinePolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Action: lambda:InvokeFunction
                Effect: Allow
                Resource: !Ref FetchTranscriptFunctionArn

  StrandsMeetingAssistFunction:
    Condition: ShouldDeployStrandsFunction
    Type: "AWS::Lambda::Function"
    Metadata:
      cfn_nag:
        rules_to_suppress:
          - id: W89
            reason: Customer can use VPC if desired
          - id: W92
            reason: Customer can choose reserved concurrency based on their requirement.
    # checkov:skip=CKV_AWS_116: "DLQ not required for meeting assist function"
    # checkov:skip=CKV_AWS_117: "Function does not require VPC access as it only interacts with AWS services via APIs"
    # checkov:skip=CKV_AWS_115: "Function does not require reserved concurrency as it scales based on demand"
    # checkov:skip=CKV_AWS_173: "Environment variables do not contain sensitive data - only configuration values like feature flags and non-sensitive settings"
    Properties:
      FunctionName: !Sub "STRANDS-${LMAStackName}-MeetingAssist"
      Role: !GetAtt StrandsMeetingAssistFunctionRole.Arn
      Handler: strands_meeting_assist_function.handler
      Runtime: python3.12
      Layers:
        - !Ref Boto3Layer
        - !Ref StrandsLayer
      Timeout: 300
      MemorySize: 512
      TracingConfig:
        Mode: Active
      Environment:
        Variables:
          FETCH_TRANSCRIPT_FUNCTION_ARN: !Ref FetchTranscriptFunctionArn
          MODEL_ID: !Ref MeetingAssistServiceBedrockModelID
          KB_ID: !Ref BedrockKnowledgeBaseId
          KB_REGION: !Ref AWS::Region
          KB_ACCOUNT_ID: !Ref AWS::AccountId
          TRANSCRIPT_KB_ID: !Ref TranscriptBedrockKnowledgeBaseId
          TAVILY_API_KEY: !Ref TavilyApiKey
          APPSYNC_GRAPHQL_URL: !Ref AppSyncGraphQLUrl
          EVENT_API_HTTP_URL: !Ref EventApiHttpUrl
          ENABLE_STREAMING: "true"
          MCP_SERVERS_TABLE: !Ref MCPServersTableName
          AWS_ACCOUNT_ID: !Ref AWS::AccountId
          KMS_KEY_ID: !Ref CustomerManagedEncryptionKeyArn
          BEDROCK_GUARDRAIL_ID: !Ref BedrockGuardrailId
          BEDROCK_GUARDRAIL_VERSION: !Ref BedrockGuardrailVersion
      Code: ./src
      LoggingConfig:
        LogGroup:
          Fn::Sub: /${AWS::StackName}/lambda/StrandsMeetingAssistFunction
    DependsOn:
      - StrandsMeetingAssistFunctionLogGroup

  StrandsMeetingAssistFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Condition: ShouldDeployStrandsFunction
    Properties:
      LogGroupName:
        Fn::Sub: /${AWS::StackName}/lambda/StrandsMeetingAssistFunction
      RetentionInDays:
        Ref: CloudWatchLogsExpirationInDays
      KmsKeyId: !Ref CustomerManagedEncryptionKeyArn

  SetupFunctionRole:
    Type: "AWS::IAM::Role"
    Properties:
      AssumeRolePolicyDocument:
        Statement:
          - Action: "sts:AssumeRole"
            Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
        Version: 2012-10-17
      ManagedPolicyArns:
        - !Sub "arn:${AWS::Partition}:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole"
      PermissionsBoundary: !If
        - HasPermissionsBoundary
        - !Ref PermissionsBoundaryArn
        - !Ref AWS::NoValue
      Policies:
        - PolicyName: InlinePolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Action:
                  - cloudformation:DescribeStacks
                  - cloudformation:DescribeStackResource
                Effect: Allow
                Resource:
                  - !Ref AISTACK
              - Action:
                  - cloudformation:DescribeStacks
                  - cloudformation:DescribeStackResource
                Effect: Allow
                Resource:
                  - !Ref COGNITOSTACK
              - Action:
                  - lambda:GetFunction
                  - lambda:GetFunctionConfiguration
                  - lambda:UpdateFunctionConfiguration
                Effect: Allow
                Resource:
                  - !Sub "arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:${LMAStackName}*"
                  - !Sub "arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:STRANDS-${LMAStackName}*"
              - Action:
                  - iam:ListRolePolicies
                  - iam:PutRolePolicy
                Effect: Allow
                Resource:
                  - !Sub "arn:${AWS::Partition}:iam::${AWS::AccountId}:role/*"
              - Action:
                  - s3:GetObject
                  - s3:PutObject
                Effect: Allow
                Resource:
                  - !Sub "arn:${AWS::Partition}:s3:::${WebAppBucket}"
                  - !Sub "arn:${AWS::Partition}:s3:::${WebAppBucket}/*"
              - Action:
                  - cloudfront:CreateInvalidation
                Effect: Allow
                Resource:
                  - !Sub "arn:${AWS::Partition}:cloudfront::${AWS::AccountId}:distribution/${CloudFrontDistributionId}"

  SetupFunction:
    Type: "AWS::Lambda::Function"
    Metadata:
      cfn_nag:
        rules_to_suppress:
          - id: W89
            reason: Customer can use VPC if desired
          - id: W92
            reason: Customer can choose reserved concurrency based on their requirement.
          - id: W58
            reason: Managed policy already provides access to CloudWatch logs.
    # checkov:skip=CKV_AWS_116: "DLQ not required for setup/configuration function"
    # checkov:skip=CKV_AWS_117: "Function does not require VPC access as it only interacts with AWS services via APIs"
    # checkov:skip=CKV_AWS_115: "Function does not require reserved concurrency as it scales based on demand"
    Properties:
      Role: !GetAtt SetupFunctionRole.Arn
      Handler: setup_function.handler
      Runtime: python3.12
      Timeout: 900
      TracingConfig:
        Mode: Active
      Code: ./src
      LoggingConfig:
        LogGroup:
          Fn::Sub: /${AWS::StackName}/lambda/SetupFunction
    DependsOn:
      - SetupFunctionLogGroup

  SetupFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName:
        Fn::Sub: /${AWS::StackName}/lambda/SetupFunction
      RetentionInDays:
        Ref: CloudWatchLogsExpirationInDays
      KmsKeyId: !Ref CustomerManagedEncryptionKeyArn

  SetupFunctionResource:
    Type: AWS::CloudFormation::CustomResource
    Properties:
      ServiceToken: !GetAtt SetupFunction.Arn
      AISTACK: !Ref AISTACK
      COGNITOSTACK: !Ref COGNITOSTACK
      MeetingAssistService: !Ref MeetingAssistService
      StrandsMeetingAssistFunction: !If
        - ShouldDeployStrandsFunction
        - !Ref StrandsMeetingAssistFunction
        - !Ref AWS::NoValue
      TranscriptBedrockKnowledgeBaseId: !If
        - ShouldConfigureTranscriptBedrockKB
        - !Ref TranscriptBedrockKnowledgeBaseId
        - !Ref AWS::NoValue
      CloudFrontDomainName: !Sub "https://${CloudFrontDomainName}/"
      # Changes to Params below force MeetingAssist Setup to execute.
      TranscribeLanguageCode: !Ref TranscribeLanguageCode
      TranscriptLambdaHookFunctionArn: !Ref TranscriptLambdaHookFunctionArn
      TranscriptLambdaHookFunctionNonPartialOnly: !Ref TranscriptLambdaHookFunctionNonPartialOnly
      MeetingRecordExpirationInDays: !Ref MeetingRecordExpirationInDays
      TranscriptionExpirationInDays: !Ref TranscriptionExpirationInDays
      EndOfCallTranscriptSummary: !Ref EndOfCallTranscriptSummary
      EndOfCallLambdaHookFunctionArn: !Ref EndOfCallLambdaHookFunctionArn
      Version: !Ref Version
    UpdateReplacePolicy: Delete
    DeletionPolicy: Delete

Outputs:
  StrandsMeetingAssistFunctionArn:
    Description: ARN of the Strands Meeting Assist Lambda function
    Value: !If [ShouldDeployStrandsFunction, !GetAtt StrandsMeetingAssistFunction.Arn, "NA"]
